services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: dev
    ports:
      - "8000:8000"
    env_file: .env.dev
    volumes:
      # Google Application Default Credentials: place your SA JSON at ./secrets/gsa.json
      # and set GOOGLE_APPLICATION_CREDENTIALS=/app/secrets/gsa.json in .env.dev
      - ./secrets:/app/secrets:ro
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend/api/app
          target: /app/app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: sync
          path: ./backend/shared/shared
          target: /app/shared/shared
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./backend/api/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock

  service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      target: dev
    env_file: .env.dev
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync+restart
          path: ./backend/service/service
          target: /app/service
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: sync+restart
          path: ./backend/shared/shared
          target: /app/shared/shared
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./backend/service/pyproject.toml
        - action: rebuild
          path: ./backend/uv.lock

  db:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-app}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    profiles: [tools]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
