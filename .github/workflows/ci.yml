name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-backend:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      # uv workspace: one venv resolves shared / api / service (+ dev tools).
      - run: cd backend && uv sync --frozen --all-packages
      # Lint + format + type-check each member's source package.
      # NOTE: keep the Annotated DI param order in api/app/api/deps.py unchanged
      # (reordering triggers DeadlockDetectedError in pytest teardown — see CLAUDE.md).
      - run: cd backend && uv run ruff check shared/shared api/app service/service
      - run: cd backend && uv run ruff format --check shared/shared api/app service/service
      - run: cd backend && uv run ty check shared/shared api/app service/service

  test-backend:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: cd backend && uv sync --frozen --all-packages
      # shared has no DB dependency.
      - run: cd backend && uv run --directory shared pytest -q
      # service tests are DB-backed (issue-018: the task handler writes Job rows);
      # conftest derives the `test` DB from DATABASE_URL (replacing /app -> /test).
      - run: cd backend && uv run --directory service pytest -q
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/app
      # api needs Postgres. `--cov` reports coverage to logs but never fails the build —
      # measure-only per docs/reference/prod-readiness.md §7 (target 100%, no gate).
      - run: cd backend && uv run --directory api pytest -v --cov=app --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test

  lint-frontend:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: cd frontend && bun install --frozen-lockfile
      - run: cd frontend && bun run lint
      # `bun run check` runs `svelte-kit sync`, which generates `$env/static/public`
      # by scanning process.env for PUBLIC_* vars. Without a `.env`, the generated
      # module won't export PUBLIC_SENTRY_DSN and svelte-check fails on the import.
      - run: cp frontend/.env.example frontend/.env
      - run: cd frontend && bun run check

  test-frontend:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: cd frontend && bun install --frozen-lockfile
      - uses: actions/cache@v6
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd frontend && bunx playwright install chromium
      - run: cd frontend && bunx playwright install-deps chromium
      # `--coverage` reports to logs but never fails the build — measure-only
      # per docs/reference/prod-readiness.md §7 (target 100%, no gate).
      - run: cd frontend && bun run test:unit --run --coverage

  # Scans the full repo + history for committed secrets. The binary is installed
  # directly (rather than via gitleaks-action) to side-step the action's
  # private-organisation licensing requirement — the gitleaks binary itself is MIT.
  secret-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --verbose --exit-code 1

  # SAST (CodeQL). Per-PR/push static analysis — kept in ci.yml because it runs on the
  # same cadence as the other gates (an active repo re-scans on every change, so no weekly
  # cron here). Heavier/slower DAST (OWASP ZAP) lives in its own zap.yml instead.
  # Permissions are scoped to THIS job so the other ci jobs keep the minimal default token.
  # build-mode: none — Python / JS-TS are interpreted, so CodeQL analyses source directly
  # (no uv/bun build needed). Findings surface in the Security tab via the SARIF upload that
  # github/codeql-action/analyze performs automatically.
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # IaC misconfig scan (Trivy config mode) over Terraform under infra/.
  # Catches GCP misconfigurations — public buckets, over-broad IAM, missing
  # encryption, allUsers invoker, etc. Same per-PR cadence/placement rationale as
  # CodeQL above; reuses the trivy-action pin already used in deploy-gcp.yml.
  # Report-only for now (exit-code 0 → never fails the build): findings surface in
  # the Security tab via SARIF, matching the measure-only stance of prod-readiness §7.
  # Tighten to a gate (exit-code 1 on CRITICAL/HIGH) once the existing backlog is triaged.
  trivy-iac:
    name: Trivy IaC (Terraform misconfig)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - name: Trivy config scan (infra/)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infra
          format: sarif
          output: trivy-iac.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0" # report-only; do not fail the build yet
      - name: Upload Trivy IaC SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-iac.sarif
          category: trivy-iac
