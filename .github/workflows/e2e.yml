name: E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: cd frontend && bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd frontend && bun x playwright install --with-deps chromium

      - name: Start full stack
        run: |
          cp .env.example .env.prod
          sed -i 's/^SECRET_KEY=.*/SECRET_KEY=e2e-test-secret-not-default/' .env.prod
          sed -i 's/^COOKIE_SECURE=.*/COOKIE_SECURE=true/' .env.prod
          docker compose -f docker-compose.prod.yml up -d --build

      - name: Wait for health
        run: |
          curl --fail --retry 10 --retry-delay 5 http://localhost:8080/api/v1/health

      - name: Run Playwright tests
        run: cd frontend && bun run test:e2e
        env:
          BASE_URL: http://localhost:8080

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v
