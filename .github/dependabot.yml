# Weekly dependency update PRs.
# Security alerts are raised immediately regardless of schedule.
# See docs/reference/prod-readiness.md §7 for the supply-chain rationale.

version: 2
updates:
  # Backend Python deps (uv reads pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Frontend JS deps (bun reads package.json + bun.lock)
  - package-ecosystem: "bun"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # 連動するパッケージはロックステップで更新する。別 PR に分かれると版がズレ、
    # 例: playwright と @playwright/test の片方だけ上がるとブラウザリビジョンが
    # 食い違い @vitest/browser-playwright の起動が失敗する。
    groups:
      playwright:
        patterns:
          - "playwright"
          - "@playwright/test"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"

  # Terraform — app stack
  - package-ecosystem: "terraform"
    directory: "/infra/gcp"
    schedule:
      interval: "weekly"

  # Terraform — bootstrap stack
  - package-ecosystem: "terraform"
    directory: "/infra/bootstrap/gcp"
    schedule:
      interval: "weekly"

  # GitHub Actions used in .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Dockerfile base images (dev + prod)
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    # Python は 3.13 ラインで運用（CLAUDE.md / requires-python >=3.13）。
    # 3.14 などの major/minor 更新は CI が Docker イメージを検証しないため自動では入れず、
    # 3.13.x のパッチ更新のみ受け取る。移行は別途方針判断のうえ手動で行う。
    ignore:
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
